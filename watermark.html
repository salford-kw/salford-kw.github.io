<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سالفورد — أداة الشعار</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C8A96E;
    --gold-light: #E8D5A3;
    --gold-dark: #a07a40;
    --bg: #0D0D0D;
    --bg2: #141414;
    --bg3: #1a1a1a;
    --border: rgba(200,169,110,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: #fff;
    min-height: 100vh;
    direction: rtl;
  }

  /* Header */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 16px rgba(200,169,110,0.3);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--gold-light);
    line-height: 1.2;
  }

  header p { font-size: 12px; color: #888; font-weight: 300; }

  .badge {
    margin-right: auto;
    background: rgba(200,169,110,0.1);
    border: 1px solid var(--border);
    color: var(--gold);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* Main layout */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 20px;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 24px;
    align-items: start;
  }

  @media(max-width:768px) {
    .main { grid-template-columns: 1fr; }
  }

  /* Panel */
  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }

  .panel-header span { font-size: 16px; }
  .panel-header h2 { font-size: 15px; font-weight: 600; color: var(--gold-light); }

  .panel-body { padding: 20px; display: flex; flex-direction: column; gap: 18px; }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all .25s;
    background: rgba(200,169,110,0.02);
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--gold);
    background: rgba(200,169,110,0.06);
  }

  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-icon { font-size: 36px; margin-bottom: 10px; }
  .upload-zone p { font-size: 14px; color: #aaa; }
  .upload-zone strong { color: var(--gold); font-size: 15px; display: block; margin-bottom: 6px; }

  /* Settings */
  .setting-group { display: flex; flex-direction: column; gap: 8px; }

  label {
    font-size: 13px;
    color: #bbb;
    font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%; height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    background: var(--gold);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(200,169,110,0.5);
  }

  .range-value {
    background: var(--bg3);
    color: var(--gold);
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 600;
    min-width: 38px;
    text-align: center;
  }

  .row { display: flex; align-items: center; gap: 10px; }

  select {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 8px;
    outline: none;
    cursor: pointer;
  }

  select:focus { border-color: var(--gold); }

  input[type=color] {
    width: 38px; height: 38px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    padding: 2px;
    background: var(--bg3);
  }

  /* Buttons */
  .btn-primary {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border: none;
    border-radius: 10px;
    color: #0D0D0D;
    font-family: 'Tajawal', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 4px 16px rgba(200,169,110,0.2);
  }

  .btn-primary:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200,169,110,0.3); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  .btn-secondary {
    flex: 1;
    padding: 11px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--gold);
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }

  .btn-secondary:hover { background: rgba(200,169,110,0.08); border-color: var(--gold); }

  /* Preview panel */
  .preview-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    min-height: 500px;
    display: flex;
    flex-direction: column;
  }

  .preview-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .preview-header-left { display: flex; align-items: center; gap: 8px; }
  .preview-header h2 { font-size: 15px; font-weight: 600; color: var(--gold-light); }

  .actions { display: flex; gap: 8px; }

  .preview-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: repeating-conic-gradient(#1a1a1a 0% 25%, #141414 0% 50%) 0 0 / 20px 20px;
    position: relative;
  }

  .placeholder {
    text-align: center;
    color: #444;
  }

  .placeholder-icon { font-size: 56px; margin-bottom: 14px; opacity: .5; }
  .placeholder p { font-size: 14px; }

  canvas {
    max-width: 100%;
    max-height: 600px;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: none;
  }

  /* File list */
  .file-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 200px;
    overflow-y: auto;
    padding-right: 2px;
  }

  .file-list::-webkit-scrollbar { width: 4px; }
  .file-list::-webkit-scrollbar-track { background: var(--bg3); border-radius: 2px; }
  .file-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .file-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--bg3);
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all .15s;
  }

  .file-item:hover { border-color: var(--border); }
  .file-item.active { border-color: var(--gold); background: rgba(200,169,110,0.08); }

  .file-thumb {
    width: 40px; height: 40px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
  }

  .file-info { flex: 1; overflow: hidden; }
  .file-name { font-size: 12px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { font-size: 11px; color: #666; }

  .file-status { font-size: 16px; }

  /* batch progress */
  .batch-bar {
    display: none;
    background: var(--bg3);
    border-radius: 6px;
    overflow: hidden;
    height: 6px;
  }

  .batch-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    border-radius: 6px;
    transition: width .3s;
    width: 0%;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg3);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 500;
    transition: transform .3s ease;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Nav arrows */
  .nav-btns { display: flex; gap: 6px; }
  .nav-btn {
    width: 32px; height: 32px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--gold);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .nav-btn:hover { background: rgba(200,169,110,0.1); border-color: var(--gold); }
  .nav-btn:disabled { opacity: .3; cursor: not-allowed; }

  .img-counter { font-size: 12px; color: #666; }

</style>
</head>
<body>

<header>
  <div class="logo-icon">🏷️</div>
  <div>
    <h1>أداة الشعار — سالفورد</h1>
    <p>أضف شعار سالفورد على صور المنتجات</p>
  </div>
  <div class="badge">الإصدار 1.0</div>
</header>

<div class="main">

  <!-- Settings Panel -->
  <div class="panel">
    <div class="panel-header">
      <span>⚙️</span>
      <h2>إعدادات الشعار</h2>
    </div>
    <div class="panel-body">

      <!-- Upload -->
      <div class="setting-group">
        <label>📁 رفع الصور</label>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept="image/*" multiple>
          <div class="upload-icon">🖼️</div>
          <strong>اختر صورة أو أكثر</strong>
          <p>JPG · PNG · WEBP · مسحوب أو نقر</p>
        </div>
      </div>

      <!-- File list -->
      <div class="file-list" id="fileList" style="display:none"></div>
      <div class="batch-bar" id="batchBar"><div class="batch-bar-fill" id="batchFill"></div></div>

      <div class="divider"></div>

      <!-- Position -->
      <div class="setting-group">
        <label>📍 موضع الشعار</label>
        <div class="row">
          <select id="positionX">
            <option value="right">يمين</option>
            <option value="center">وسط</option>
            <option value="left">يسار</option>
          </select>
          <select id="positionY">
            <option value="bottom" selected>أسفل</option>
            <option value="center">وسط</option>
            <option value="top">أعلى</option>
          </select>
        </div>
      </div>

      <!-- Size -->
      <div class="setting-group">
        <div class="row">
          <label>🔡 حجم الشعار</label>
          <div class="range-value" id="sizeVal">26</div>
        </div>
        <input type="range" id="fontSize" min="14" max="60" value="26">
      </div>

      <!-- Opacity -->
      <div class="setting-group">
        <div class="row">
          <label>🌗 الشفافية</label>
          <div class="range-value" id="opacityVal">90%</div>
        </div>
        <input type="range" id="opacity" min="20" max="100" value="90">
      </div>

      <!-- Padding -->
      <div class="setting-group">
        <div class="row">
          <label>↕️ المسافة من الحافة</label>
          <div class="range-value" id="paddingVal">24px</div>
        </div>
        <input type="range" id="padding" min="8" max="80" value="24">
      </div>

      <!-- Color -->
      <div class="setting-group">
        <label>🎨 لون النص</label>
        <div class="row">
          <select id="colorPreset">
            <option value="#C8A96E">ذهبي سالفورد</option>
            <option value="#ffffff">أبيض</option>
            <option value="#000000">أسود</option>
            <option value="#E8D5A3">ذهبي فاتح</option>
            <option value="custom">مخصص</option>
          </select>
          <input type="color" id="colorPicker" value="#C8A96E">
        </div>
      </div>

      <!-- Style -->
      <div class="setting-group">
        <label>✨ أسلوب الشعار</label>
        <select id="style">
          <option value="text-shadow">نص مع ظل (افتراضي)</option>
          <option value="box">إطار شفاف</option>
          <option value="line">خط ذهبي</option>
          <option value="minimal">بسيط بدون إطار</option>
        </select>
      </div>

      <div class="divider"></div>

      <!-- Action buttons -->
      <button class="btn-primary" id="applyBtn" disabled onclick="applyWatermark()">
        ✨ تطبيق الشعار
      </button>

      <div class="row">
        <button class="btn-secondary" id="downloadBtn" disabled onclick="downloadCurrent()">
          ⬇️ تحميل
        </button>
        <button class="btn-secondary" id="downloadAllBtn" disabled onclick="downloadAll()">
          📦 تحميل الكل
        </button>
      </div>

    </div>
  </div>

  <!-- Preview Panel -->
  <div class="preview-panel">
    <div class="preview-header">
      <div class="preview-header-left">
        <span>👁️</span>
        <h2>المعاينة</h2>
        <span class="img-counter" id="imgCounter"></span>
      </div>
      <div class="actions">
        <div class="nav-btns">
          <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled title="السابق">‹</button>
          <button class="nav-btn" id="nextBtn" onclick="navigate(1)" disabled title="التالي">›</button>
        </div>
      </div>
    </div>
    <div class="preview-body" id="previewBody">
      <div class="placeholder">
        <div class="placeholder-icon">🖼️</div>
        <p>ارفع صورة لتبدأ</p>
      </div>
      <canvas id="canvas"></canvas>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // State
  let files = [];
  let images = []; // HTMLImageElement
  let processed = []; // canvas data URLs
  let currentIndex = 0;

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const fileInput = document.getElementById('fileInput');
  const fileListEl = document.getElementById('fileList');

  // Watermark text
  const WM_LINE1 = 'سالفورد للأثاث والمفروشات';
  const WM_LINE2 = '55943343';

  // ─── File input ───────────────────────────────────────────
  fileInput.addEventListener('change', e => handleFiles(e.target.files));

  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });

  function handleFiles(newFiles) {
    Array.from(newFiles).forEach(f => {
      if (!f.type.startsWith('image/')) return;
      files.push(f);
      images.push(null);
      processed.push(null);
      const idx = files.length - 1;
      loadImage(f, idx);
    });
    if (files.length > 0) {
      fileListEl.style.display = 'flex';
      document.getElementById('applyBtn').disabled = false;
    }
  }

  function loadImage(file, idx) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        images[idx] = img;
        renderFileItem(idx);
        if (idx === currentIndex) showImage(idx);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function renderFileItem(idx) {
    const existing = document.getElementById('file-item-' + idx);
    if (existing) { existing.remove(); }

    const f = files[idx];
    const item = document.createElement('div');
    item.className = 'file-item' + (idx === currentIndex ? ' active' : '');
    item.id = 'file-item-' + idx;
    item.onclick = () => { currentIndex = idx; updateActiveItem(); showImage(idx); };

    const thumb = document.createElement('img');
    thumb.className = 'file-thumb';
    if (images[idx]) {
      const tc = document.createElement('canvas');
      tc.width = 80; tc.height = 80;
      const tctx = tc.getContext('2d');
      tctx.drawImage(images[idx], 0, 0, 80, 80);
      thumb.src = tc.toDataURL();
    }
    item.appendChild(thumb);

    const info = document.createElement('div');
    info.className = 'file-info';
    info.innerHTML = `<div class="file-name">${f.name}</div><div class="file-size">${(f.size/1024).toFixed(0)} KB</div>`;
    item.appendChild(info);

    const status = document.createElement('div');
    status.className = 'file-status';
    status.id = 'status-' + idx;
    status.textContent = processed[idx] ? '✅' : '⬜';
    item.appendChild(status);

    fileListEl.appendChild(item);
  }

  function updateActiveItem() {
    document.querySelectorAll('.file-item').forEach((el, i) => {
      el.classList.toggle('active', i === currentIndex);
    });
  }

  function showImage(idx) {
    if (!images[idx]) return;
    currentIndex = idx;
    const ph = document.querySelector('.placeholder');
    if (ph) ph.style.display = 'none';
    canvas.style.display = 'block';

    if (processed[idx]) {
      const tmpImg = new Image();
      tmpImg.onload = () => {
        canvas.width = tmpImg.width;
        canvas.height = tmpImg.height;
        ctx.drawImage(tmpImg, 0, 0);
      };
      tmpImg.src = processed[idx];
    } else {
      canvas.width = images[idx].naturalWidth;
      canvas.height = images[idx].naturalHeight;
      ctx.drawImage(images[idx], 0, 0);
    }

    updateNav();
    updateCounter();
    updateActiveItem();
  }

  function updateNav() {
    document.getElementById('prevBtn').disabled = currentIndex <= 0;
    document.getElementById('nextBtn').disabled = currentIndex >= files.length - 1;
  }

  function updateCounter() {
    document.getElementById('imgCounter').textContent = files.length > 0 ? `${currentIndex + 1} / ${files.length}` : '';
  }

  function navigate(dir) {
    const next = currentIndex + dir;
    if (next < 0 || next >= files.length) return;
    currentIndex = next;
    showImage(currentIndex);
  }

  // ─── Watermark ────────────────────────────────────────────
  function applyWatermark() {
    if (!images[currentIndex]) return;
    drawWatermark(currentIndex);
    showToast('✅ تم تطبيق الشعار');
    document.getElementById('downloadBtn').disabled = false;
    document.getElementById('downloadAllBtn').disabled = false;
  }

  function drawWatermark(idx) {
    const img = images[idx];
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);

    const fontSize = parseInt(document.getElementById('fontSize').value);
    const opacityVal = parseInt(document.getElementById('opacity').value) / 100;
    const pad = parseInt(document.getElementById('padding').value);
    const posX = document.getElementById('positionX').value;
    const posY = document.getElementById('positionY').value;
    const colorPreset = document.getElementById('colorPreset').value;
    const colorCustom = document.getElementById('colorPicker').value;
    const color = colorPreset === 'custom' ? colorCustom : colorPreset;
    const style = document.getElementById('style').value;

    const scale = Math.min(img.naturalWidth / 400, 3);
    const fs1 = Math.round(fontSize * scale);
    const fs2 = Math.round(fontSize * 0.75 * scale);
    const paddingPx = Math.round(pad * scale);
    const lineGap = Math.round(fs1 * 0.4);

    ctx.save();
    ctx.globalAlpha = opacityVal;
    ctx.direction = 'rtl';
    ctx.textBaseline = 'middle';

    const font1 = `bold ${fs1}px Tajawal, Arial`;
    const font2 = `${fs2}px Tajawal, Arial`;

    ctx.font = font1;
    const w1 = ctx.measureText(WM_LINE1).width;
    ctx.font = font2;
    const w2 = ctx.measureText(WM_LINE2).width;

    const blockW = Math.max(w1, w2) + paddingPx * 2.5;
    const blockH = fs1 + lineGap + fs2 + paddingPx * 2;

    // X position
    let bx;
    if (posX === 'right') bx = canvas.width - blockW - paddingPx;
    else if (posX === 'left') bx = paddingPx;
    else bx = (canvas.width - blockW) / 2;

    // Y position
    let by;
    if (posY === 'bottom') by = canvas.height - blockH - paddingPx;
    else if (posY === 'top') by = paddingPx;
    else by = (canvas.height - blockH) / 2;

    const cx = bx + blockW / 2;
    const cy1 = by + paddingPx + fs1 / 2;
    const cy2 = cy1 + fs1 / 2 + lineGap + fs2 / 2;

    // Style backgrounds
    if (style === 'box') {
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      const r = Math.round(12 * scale);
      roundRect(ctx, bx, by, blockW, blockH, r);
      ctx.fill();

      ctx.strokeStyle = color;
      ctx.lineWidth = Math.max(1.5, scale);
      roundRect(ctx, bx, by, blockW, blockH, r);
      ctx.stroke();
    }

    if (style === 'line') {
      const lw = Math.max(2, scale * 1.5);
      ctx.strokeStyle = color;
      ctx.lineWidth = lw;
      ctx.beginPath();
      ctx.moveTo(bx, by + blockH);
      ctx.lineTo(bx + blockW, by + blockH);
      ctx.stroke();
    }

    // Shadow for text-shadow and minimal
    if (style === 'text-shadow' || style === 'minimal') {
      ctx.shadowColor = 'rgba(0,0,0,0.9)';
      ctx.shadowBlur = Math.round(8 * scale);
      ctx.shadowOffsetX = Math.round(2 * scale);
      ctx.shadowOffsetY = Math.round(2 * scale);
    }

    // Draw text centered
    ctx.textAlign = 'center';
    ctx.fillStyle = color;

    ctx.font = font1;
    ctx.fillText(WM_LINE1, cx, cy1);

    ctx.font = font2;
    ctx.fillStyle = toRgba(color, 0.85);
    ctx.fillText(WM_LINE2, cx, cy2);

    ctx.restore();

    processed[idx] = canvas.toDataURL('image/png');
    const statusEl = document.getElementById('status-' + idx);
    if (statusEl) statusEl.textContent = '✅';
  }

  function toRgba(hex, a) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ─── Download ─────────────────────────────────────────────
  function downloadCurrent() {
    if (!processed[currentIndex]) { showToast('⚠️ اضغط "تطبيق الشعار" أولاً'); return; }
    const a = document.createElement('a');
    a.href = processed[currentIndex];
    a.download = 'salford-' + (files[currentIndex]?.name || 'image.png');
    a.click();
    showToast('⬇️ تم التحميل');
  }

  async function downloadAll() {
    const allIdxs = files.map((_,i) => i);
    document.getElementById('batchBar').style.display = 'block';

    for (let i = 0; i < allIdxs.length; i++) {
      const idx = allIdxs[i];
      if (!images[idx]) continue;
      if (!processed[idx]) drawWatermark(idx);
      await new Promise(r => setTimeout(r, 80));
      const a = document.createElement('a');
      a.href = processed[idx];
      a.download = 'salford-' + (files[idx]?.name || `image-${idx}.png`);
      a.click();
      document.getElementById('batchFill').style.width = ((i+1)/files.length*100) + '%';
      showToast(`⬇️ تحميل ${i+1} / ${files.length}`);
    }

    setTimeout(() => { document.getElementById('batchBar').style.display = 'none'; }, 1500);
  }

  // ─── Live preview on settings change ─────────────────────
  ['fontSize','opacity','padding','positionX','positionY','colorPreset','style'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      updateLabels();
      if (images[currentIndex] && processed[currentIndex]) {
        drawWatermark(currentIndex);
        showImage(currentIndex);
      }
    });
  });

  document.getElementById('colorPicker').addEventListener('input', () => {
    document.getElementById('colorPreset').value = 'custom';
    if (images[currentIndex] && processed[currentIndex]) {
      drawWatermark(currentIndex);
      showImage(currentIndex);
    }
  });

  document.getElementById('colorPreset').addEventListener('change', () => {
    const val = document.getElementById('colorPreset').value;
    if (val !== 'custom') document.getElementById('colorPicker').value = val;
  });

  function updateLabels() {
    document.getElementById('sizeVal').textContent = document.getElementById('fontSize').value;
    document.getElementById('opacityVal').textContent = document.getElementById('opacity').value + '%';
    document.getElementById('paddingVal').textContent = document.getElementById('padding').value + 'px';
  }

  // ─── Toast ────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  updateLabels();
</script>
</body>
</html>
