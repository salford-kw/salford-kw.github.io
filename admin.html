<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم سالفورد</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#C8A96E;--gold-light:#E8D5A3;--dark:#0D0D0D;--dark2:#111008;--card:#1a1a1a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Tajawal,sans-serif;background:var(--dark);color:#F9F4EC;direction:rtl;min-height:100vh;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--dark2);border:1px solid rgba(200,169,110,.2);border-radius:20px;padding:40px 30px;width:100%;max-width:380px;text-align:center;}
.login-logo{font-size:40px;font-weight:900;color:var(--gold);margin-bottom:6px;}
.login-sub{font-size:14px;color:rgba(200,169,110,.6);margin-bottom:30px;}
.login-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(200,169,110,.2);border-radius:10px;padding:14px 16px;font-family:Tajawal,sans-serif;font-size:16px;color:#F9F4EC;text-align:center;letter-spacing:4px;margin-bottom:16px;outline:none;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;background:var(--gold);color:#0D0D0D;border:none;border-radius:10px;padding:14px;font-family:Tajawal,sans-serif;font-size:17px;font-weight:900;cursor:pointer;}
.login-btn:hover{opacity:.9;}
.login-error{color:#ff6b6b;font-size:13px;margin-top:10px;display:none;}

/* ADMIN PANEL */
#admin-panel{display:none;}
.top-bar{background:var(--dark2);border-bottom:1px solid rgba(200,169,110,.2);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.top-logo{font-size:20px;font-weight:900;color:var(--gold);}
.top-actions{display:flex;gap:8px;}
.btn-save-all{background:var(--gold);color:#0D0D0D;border:none;border-radius:8px;padding:8px 16px;font-family:Tajawal,sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.btn-export{background:rgba(200,169,110,.15);color:var(--gold);border:1px solid rgba(200,169,110,.3);border-radius:8px;padding:8px 14px;font-family:Tajawal,sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.btn-logout{background:rgba(255,100,100,.1);color:#ff6b6b;border:1px solid rgba(255,100,100,.2);border-radius:8px;padding:8px 12px;font-family:Tajawal,sans-serif;font-size:13px;cursor:pointer;}

/* TABS */
.tabs{display:flex;background:var(--dark2);border-bottom:1px solid rgba(200,169,110,.15);overflow-x:auto;}
.tab{padding:12px 20px;font-family:Tajawal,sans-serif;font-size:14px;font-weight:700;color:rgba(200,169,110,.5);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-content{display:none;padding:16px;}
.tab-content.active{display:block;}

/* PRODUCT EDITOR */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-size:15px;font-weight:700;color:var(--gold);}
.btn-add{background:rgba(200,169,110,.15);color:var(--gold);border:1px solid rgba(200,169,110,.3);border-radius:8px;padding:8px 14px;font-family:Tajawal,sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.product-editor{background:var(--card);border:1px solid rgba(200,169,110,.12);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.product-editor-header{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(200,169,110,.05);border-bottom:1px solid rgba(200,169,110,.1);}
.product-img-preview{width:50px;height:50px;border-radius:8px;object-fit:cover;border:1px solid rgba(200,169,110,.2);}
.product-code-display{font-size:13px;font-weight:700;color:var(--gold-light);flex:1;}
.btn-delete{background:rgba(255,80,80,.1);color:#ff6b6b;border:none;border-radius:6px;padding:5px 10px;font-family:Tajawal,sans-serif;font-size:12px;cursor:pointer;}
.product-editor-body{padding:12px;}
.field-group{margin-bottom:10px;}
.field-label{font-size:12px;color:rgba(200,169,110,.6);margin-bottom:4px;display:block;}
.field-input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(200,169,110,.15);border-radius:8px;padding:10px 12px;font-family:Tajawal,sans-serif;font-size:13px;color:#F9F4EC;outline:none;resize:none;}
.field-input:focus{border-color:var(--gold);}
textarea.field-input{height:70px;line-height:1.6;}

/* TOAST */
.toast{position:fixed;bottom:80px;right:50%;transform:translateX(50%);background:#1ebe52;color:#fff;padding:12px 24px;border-radius:10px;font-family:Tajawal,sans-serif;font-size:14px;font-weight:700;z-index:9999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.4);}

/* ADD PRODUCT FORM */
.add-form{background:rgba(200,169,110,.05);border:1px dashed rgba(200,169,110,.3);border-radius:12px;padding:14px;margin-bottom:14px;display:none;}
.add-form-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:12px;}
.add-row{display:flex;gap:8px;margin-top:10px;}
.btn-add-confirm{background:var(--gold);color:#0D0D0D;border:none;border-radius:8px;padding:10px 18px;font-family:Tajawal,sans-serif;font-size:13px;font-weight:700;cursor:pointer;flex:1;}
.btn-add-cancel{background:rgba(255,255,255,.05);color:rgba(249,244,236,.6);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;font-family:Tajawal,sans-serif;font-size:13px;cursor:pointer;}

/* PREVIEW LINKS */
.preview-bar{background:rgba(200,169,110,.04);border-top:1px solid rgba(200,169,110,.08);padding:12px 16px;display:flex;gap:10px;flex-wrap:wrap;}
.preview-link{display:inline-flex;align-items:center;gap:6px;color:rgba(200,169,110,.6);font-size:12px;text-decoration:none;background:rgba(200,169,110,.08);padding:6px 12px;border-radius:8px;border:1px solid rgba(200,169,110,.15);}
.preview-link:hover{color:var(--gold);}

/* STATS */
.stats-bar{display:flex;gap:10px;padding:14px 16px 0;flex-wrap:wrap;}
.stat-card{background:rgba(200,169,110,.06);border:1px solid rgba(200,169,110,.12);border-radius:10px;padding:12px 16px;flex:1;min-width:80px;text-align:center;}
.stat-num{font-size:24px;font-weight:900;color:var(--gold);}
.stat-label{font-size:11px;color:rgba(200,169,110,.5);margin-top:2px;}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">سالفورد</div>
    <div class="login-sub">لوحة إدارة المنتجات</div>
    <input type="password" class="login-input" id="pwd-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkLogin()">
    <button class="login-btn" onclick="checkLogin()">دخول</button>
    <div class="login-error" id="login-error">❌ كلمة المرور غير صحيحة</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="top-bar">
    <div class="top-logo">⚙️ لوحة التحكم</div>
    <div class="top-actions">
      <button class="btn-save-all" onclick="saveAll()">💾 حفظ الكل</button>
      <button class="btn-export" onclick="exportJSON()">📥 تحميل JSON</button>
      <button class="btn-logout" onclick="logout()">خروج</button>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('sajjad',this)">🧶 السجاد والموكيت</div>
    <div class="tab" onclick="switchTab('majalis',this)">🏠 المجالس والمساند</div>
    <div class="tab" onclick="switchTab('athath',this)">🛋️ الأثاث والديكور</div>
  </div>

  <div id="tab-sajjad" class="tab-content active"></div>
  <div id="tab-majalis" class="tab-content"></div>
  <div id="tab-athath" class="tab-content"></div>

  <div class="preview-bar">
    <span style="font-size:12px;color:rgba(200,169,110,.4);align-self:center;">معاينة:</span>
    <a href="/sajjad.html" target="_blank" class="preview-link">🧶 السجاد</a>
    <a href="/majalis.html" target="_blank" class="preview-link">🏠 المجالس</a>
    <a href="/athath.html" target="_blank" class="preview-link">🛋️ الأثاث</a>
    <a href="/" target="_blank" class="preview-link">🏠 الرئيسية</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PASS = 'hamad2012';
const STORAGE_KEY = 'salford_products';

// Default products (fallback)
const DEFAULT_PRODUCTS = {
  sajjad:[
    {code:"سجاد تركي كود 01",desc:"سجاد تركي ناعم الملمس بوبرة عالية مناسب للصالونات والمجالس الفاخرة",img:"https://i.ibb.co/Fb6sjX3c/17240267190464-status-e8350b3f3ae64895949c7e6ed286d22f.jpg"},
    {code:"سجاد تركي كود 02",desc:"سجاد تركي متوسط السماكة بألوان كلاسيكية مناسب للمجالس الكويتية",img:"https://i.ibb.co/LdMkkDPb/17240267190464-status-4086fc05ecbb42afbb21bc0254b8ca73.jpg"},
    {code:"سجاد تركي كود 03",desc:"سجاد تركي بوبرة متوسطة وألوان هادئة مثالي للغرف والممرات",img:"https://i.ibb.co/HTnR4SX8/17240267190464-status-f9f30bddabef44ba83c796b09321337a.jpg"},
    {code:"سجاد تركي كود 04",desc:"سجاد تركي عصري بتصميم مودرن وألوان هادئة يناسب الديكورات الحديثة",img:"https://i.ibb.co/Z1xTt6j3/17240267190464-status-IMG-20260404-WA0001.jpg"},
    {code:"سجاد تركي كود 05",desc:"سجاد تركي بتصاميم جغرافية راقية وألوان عصرية لكل الأذواق",img:"https://i.ibb.co/6RyXynDj/17240267190464-status-fa62e2151c844ea6bf1ddbd98699dbea.jpg"},
    {code:"سجاد تركي كود 06",desc:"سجاد تركي بوبرة ثقيلة وألوان ملكية فاخرة يليق بأرقى المجالس",img:"https://i.ibb.co/XfqkHrgv/17240267190464-status-b44d09819ab644339b399440bd7ef117.jpg"},
    {code:"سجاد تركي كود 07",desc:"سجاد تركي بمقاسات كبيرة مناسب للمجالس والديوانيات الكويتية",img:"https://i.ibb.co/fGph1FDk/IMG-20260415-WA0106.jpg"},
    {code:"موكيت تركي كود 01",desc:"موكيت تركي متين بكثافة عالية قص بالمتر مع تركيب احترافي في الكويت",img:"https://i.ibb.co/93WQVDKH/IMG-20260415-WA0098.jpg"},
    {code:"موكيت تركي كود 02",desc:"موكيت تركي ناعم الملمس بوبرة كثيفة مريح للقدمين طويل العمر",img:"https://i.ibb.co/zHsx3P5K/IMG-20260415-WA0096.jpg"},
    {code:"موكيت تركي كود 03",desc:"موكيت تركي بألوان هادئة مناسب للمكاتب والمنازل مع ضمان التركيب",img:"https://i.ibb.co/JFvXbSvP/IMG-20260415-WA0095.jpg"},
    {code:"موكيت تركي كود 04",desc:"موكيت تركي اقتصادي متين مناسب للمكاتب والشركات بأسعار مميزة",img:"https://i.ibb.co/bfWhPJ2/IMG-20260415-WA0054.jpg"},
    {code:"موكيت تركي كود 05",desc:"موكيت تركي فاخر بألوان راقية من أكبر تشكيلة في الكويت لدى سالفورد",img:"https://i.ibb.co/FkcTTjzQ/IMG-20260415-WA0056.jpg"}
  ],
  majalis:[
    {code:"مجلس ديكور كود 01",desc:"مجلس ديكور فاخر مفصّل بأعلى جودة يليق بأرقى الديوانيات الكويتية",img:"https://i.ibb.co/JFvXbSvP/IMG-20260415-WA0095.jpg"},
    {code:"مجلس ديكور كود 02",desc:"مجلس عربي أصيل بتصميم تقليدي كويتي يعكس الهوية والأصالة الخليجية",img:"https://i.ibb.co/fzgcCMbq/IMG-20260415-WA0081.jpg"},
    {code:"مساند ديكور كود 01",desc:"مساند ديكور فاخرة بأشكال وألوان متنوعة تضيف رونقاً على مجلسك",img:"https://i.ibb.co/spDMmv4f/IMG-20260415-WA0086.jpg"},
    {code:"مجلس ديكور كود 03",desc:"نفصّل مجالس رجال ونساء حسب مقاسات ديوانيتك وذوقك الشخصي",img:"https://i.ibb.co/8nFPNKqH/IMG-20260415-WA0085.jpg"},
    {code:"ديوانية كويتية كود 01",desc:"ديوانية كويتية مفصّلة بخامات راقية وأسعار مميزة مع ضمان التنفيذ",img:"https://i.ibb.co/jk7kqpmV/IMG-20260415-WA0075.jpg"},
    {code:"تكايات ومراكي كود 01",desc:"تكايات ومراكي ومساند ظهر كويتية تُصنع حسب الطلب بأجود الأقمشة",img:"https://i.ibb.co/yczQjrZY/IMG-20260415-WA0073.jpg"}
  ],
  athath:[
    {code:"ديكور داخلي كود 01",desc:"تصميم ديكور داخلي راقٍ ينقل بيتك وديوانيتك لمستوى آخر من الأناقة",img:"https://i.ibb.co/N2SC1qNq/20260416-023818.png"},
    {code:"كنب مودرن كود 01",desc:"كنب مودرن بأشكال أنيقة وعصرية مناسب لغرف الجلوس الكويتية",img:"https://i.ibb.co/20JZTdcH/IMG-20260415-WA0103.jpg"},
    {code:"أثاث فاخر كود 01",desc:"أثاث منزلي فاخر بجودة عالية من أرقى الخامات والأقمشة الراقية",img:"https://i.ibb.co/JFvXbSvP/IMG-20260415-WA0095.jpg"},
    {code:"كنب مودرن كود 02",desc:"كنب عصري أنيق بألوان هادئة مناسب لغرف الاستقبال والجلوس",img:"https://i.ibb.co/WW4pYX9Z/IMG-20260415-WA0057.jpg"},
    {code:"كنب تفصيل كود 01",desc:"كنب مفصّل حسب الطلب بأجود الأقمشة والخامات الراقية مع ضمان الجودة",img:"https://i.ibb.co/fTKHRsz/IMG-20260415-WA0071.jpg"},
    {code:"ديكور مجالس كود 01",desc:"ديكور مجالس يجمع الأصالة والعصرية بلمسة كويتية مميزة",img:"https://i.ibb.co/B2XB8qLq/IMG-20260415-WA0070.jpg"},
    {code:"أثاث ديوانية كود 01",desc:"أثاث وديكور ديوانية كويتية مفصّل بأعلى مستوى من الدقة والإتقان",img:"https://i.ibb.co/yczQjrZY/IMG-20260415-WA0073.jpg"},
    {code:"تنجيد أثاث كود 01",desc:"تفصيل وتنجيد أثاث منزلي وديوانيات حسب الطلب بضمان الجودة الكاملة",img:"https://i.ibb.co/jk7kqpmV/IMG-20260415-WA0075.jpg"}
  ]
};

// State
let products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));

// Load from localStorage if exists
function loadProducts() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) products = JSON.parse(saved);
    else products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
  } catch(e) {
    products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
  }
}

function saveProducts() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
}

// Auth
function checkLogin() {
  const val = document.getElementById('pwd-input').value;
  if (val === PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadProducts();
    renderAll();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
    setTimeout(()=>document.getElementById('login-error').style.display='none', 2000);
  }
}

function logout() {
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pwd-input').value = '';
}

// Tabs
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

// Render
function renderAll() {
  renderStats();
  renderTab('sajjad');
  renderTab('majalis');
  renderTab('athath');
}

function renderStats() {
  const total = products.sajjad.length + products.majalis.length + products.athath.length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">إجمالي المنتجات</div></div>
    <div class="stat-card"><div class="stat-num">${products.sajjad.length}</div><div class="stat-label">السجاد والموكيت</div></div>
    <div class="stat-card"><div class="stat-num">${products.majalis.length}</div><div class="stat-label">المجالس</div></div>
    <div class="stat-card"><div class="stat-num">${products.athath.length}</div><div class="stat-label">الأثاث</div></div>
  `;
}

function renderTab(section) {
  const container = document.getElementById('tab-'+section);
  const labels = {sajjad:'السجاد والموكيت',majalis:'المجالس والمساند',athath:'الأثاث والديكور'};

  let html = `
    <div class="section-header" style="margin-top:16px;">
      <span class="section-title">${labels[section]} (${products[section].length} منتج)</span>
      <button class="btn-add" onclick="toggleAddForm('${section}')">+ إضافة منتج</button>
    </div>
    <div class="add-form" id="add-form-${section}">
      <div class="add-form-title">➕ إضافة منتج جديد</div>
      <div class="field-group">
        <label class="field-label">اسم المنتج / الكود</label>
        <input type="text" class="field-input" id="new-code-${section}" placeholder="مثال: سجاد تركي كود 13">
      </div>
      <div class="field-group">
        <label class="field-label">الوصف</label>
        <textarea class="field-input" id="new-desc-${section}" placeholder="وصف مختصر للمنتج..."></textarea>
      </div>
      <div class="field-group">
        <label class="field-label">رابط الصورة (ibb.co)</label>
        <input type="text" class="field-input" id="new-img-${section}" placeholder="https://i.ibb.co/...">
      </div>
      <div class="add-row">
        <button class="btn-add-confirm" onclick="addProduct('${section}')">✅ إضافة</button>
        <button class="btn-add-cancel" onclick="toggleAddForm('${section}')">إلغاء</button>
      </div>
    </div>
  `;

  products[section].forEach((p, i) => {
    html += `
    <div class="product-editor" id="prod-${section}-${i}">
      <div class="product-editor-header">
        <img class="product-img-preview" src="${p.img}" alt="${p.code}" onerror="this.src='https://placehold.co/50x50/1c1805/C8A96E?text=?'">
        <span class="product-code-display">${p.code}</span>
        <button class="btn-delete" onclick="deleteProduct('${section}',${i})">🗑 حذف</button>
      </div>
      <div class="product-editor-body">
        <div class="field-group">
          <label class="field-label">اسم المنتج / الكود</label>
          <input type="text" class="field-input" id="code-${section}-${i}" value="${p.code}" onchange="updateProduct('${section}',${i},'code',this.value)">
        </div>
        <div class="field-group">
          <label class="field-label">الوصف</label>
          <textarea class="field-input" id="desc-${section}-${i}" onchange="updateProduct('${section}',${i},'desc',this.value)">${p.desc}</textarea>
        </div>
        <div class="field-group">
          <label class="field-label">رابط الصورة</label>
          <input type="text" class="field-input" id="img-${section}-${i}" value="${p.img}" onchange="updateProduct('${section}',${i},'img',this.value);this.previousElementSibling&&(this.closest('.product-editor').querySelector('img').src=this.value)">
        </div>
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

// Actions
function updateProduct(section, i, field, val) {
  products[section][i][field] = val;
  if (field === 'code') {
    document.querySelector(`#prod-${section}-${i} .product-code-display`).textContent = val;
  }
}

function deleteProduct(section, i) {
  if (!confirm(`حذف "${products[section][i].code}"؟`)) return;
  products[section].splice(i, 1);
  renderTab(section);
  renderStats();
  showToast('🗑 تم الحذف');
}

function toggleAddForm(section) {
  const form = document.getElementById('add-form-'+section);
  form.style.display = form.style.display === 'block' ? 'none' : 'block';
}

function addProduct(section) {
  const code = document.getElementById('new-code-'+section).value.trim();
  const desc = document.getElementById('new-desc-'+section).value.trim();
  const img = document.getElementById('new-img-'+section).value.trim();
  if (!code || !img) { showToast('⚠️ أدخل الاسم والصورة على الأقل', '#ff6b6b'); return; }
  products[section].push({ code, desc: desc || 'منتج جديد من سالفورد للأثاث والمفروشات', img });
  renderTab(section);
  renderStats();
  showToast('✅ تمت الإضافة');
}

function saveAll() {
  // Collect all current input values
  ['sajjad','majalis','athath'].forEach(section => {
    products[section].forEach((p, i) => {
      const codeEl = document.getElementById(`code-${section}-${i}`);
      const descEl = document.getElementById(`desc-${section}-${i}`);
      const imgEl = document.getElementById(`img-${section}-${i}`);
      if (codeEl) p.code = codeEl.value;
      if (descEl) p.desc = descEl.value;
      if (imgEl) p.img = imgEl.value;
    });
  });
  saveProducts();
  renderAll();
  showToast('💾 تم الحفظ بنجاح!');
}

function exportJSON() {
  saveAll();
  const json = JSON.stringify(products, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'products.json';
  a.click();
  showToast('📥 جاري التحميل...');
}

function showToast(msg, color='#1ebe52') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color;
  t.style.display = 'block';
  setTimeout(()=>t.style.display='none', 2500);
}
</script>
