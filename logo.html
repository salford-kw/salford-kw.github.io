<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سالفورد للأثاث - إضافة العلامة المائية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            font-family: 'Lora', serif;
            color: #333;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            color: #1a237e;
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p { color: #666; font-size: 1.05rem; font-weight: 500; }

        /* ===== لوحة الإعدادات ===== */
        .settings-panel {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 30px 35px;
            margin-bottom: 30px;
            animation: fadeInDown 0.9s ease-out;
        }

        .settings-panel h2 {
            font-family: 'Playfair Display', serif;
            color: #1a237e;
            font-size: 1.5rem;
            margin-bottom: 25px;
            font-weight: 700;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 12px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        .setting-group label {
            display: block;
            font-weight: 600;
            color: #444;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        /* شريط الشفافية */
        .opacity-wrap {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to left, #c5a059, #e8d5a3);
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #c5a059;
            border: 3px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .opacity-val {
            min-width: 48px;
            text-align: center;
            font-weight: 700;
            color: #1a237e;
            font-size: 1rem;
            background: #f0f4ff;
            padding: 4px 8px;
            border-radius: 6px;
        }

        /* حجم الشعار */
        .size-wrap { display: flex; align-items: center; gap: 15px; }

        /* شبكة المواضع */
        .position-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            max-width: 210px;
        }

        .pos-btn {
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: #fafafa;
            cursor: pointer;
            text-align: center;
            font-size: 1.2rem;
            transition: all 0.2s;
            line-height: 1;
        }

        .pos-btn:hover { border-color: #c5a059; background: #fff8ed; }

        .pos-btn.active {
            border-color: #1a237e;
            background: #eef1ff;
            box-shadow: 0 2px 8px rgba(26,35,126,0.2);
        }

        /* ===== قسم الرفع ===== */
        .upload-section {
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            animation: fadeInLeft 0.8s ease-out;
        }

        .upload-section h2 {
            font-family: 'Playfair Display', serif;
            color: #1a237e;
            font-size: 1.6rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .upload-area {
            border: 3px dashed #c5a059;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .upload-area:hover, .upload-area.dragover {
            background: #f0f0f0;
            border-color: #1a237e;
            box-shadow: 0 5px 20px rgba(26,35,126,0.15);
            transform: translateY(-2px);
        }

        .upload-icon { font-size: 3rem; margin-bottom: 12px; color: #c5a059; }
        .upload-text { font-size: 1.1rem; color: #333; margin-bottom: 6px; font-weight: 600; }
        .upload-subtext { color: #999; font-size: 0.9rem; }
        #imageInput { display: none; }

        /* شريط التقدم */
        .progress-wrap {
            display: none;
            margin-top: 20px;
        }

        .progress-wrap.show { display: block; }

        .progress-bar-track {
            background: #eee;
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(to left, #c5a059, #1a237e);
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            text-align: center;
            font-size: 0.9rem;
            color: #666;
            font-weight: 600;
        }

        /* ===== شبكة الصور ===== */
        .results-section {
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: fadeInRight 0.8s ease-out;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .results-header h2 {
            font-family: 'Playfair Display', serif;
            color: #1a237e;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .results-count {
            background: #eef1ff;
            color: #1a237e;
            font-weight: 700;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }

        .image-card {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            background: #fafafa;
            position: relative;
        }

        .image-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .image-card canvas {
            width: 100%;
            display: block;
        }

        .card-footer {
            padding: 8px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-top: 1px solid #f0f0f0;
        }

        .card-name {
            font-size: 0.75rem;
            color: #555;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100px;
        }

        .btn-dl-single {
            background: #c5a059;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 4px 8px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-dl-single:hover { background: #a68546; }

        /* أزرار رئيسية */
        .main-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 30px;
        }

        .btn-custom {
            padding: 13px 32px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Lora', serif;
        }

        .btn-download-all {
            background: #1a237e;
            color: white;
        }

        .btn-download-all:hover {
            background: #0d1b5e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26,35,126,0.3);
        }

        .btn-reset {
            background: #c5a059;
            color: white;
        }

        .btn-reset:hover {
            background: #a68546;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(197,160,89,0.3);
        }

        .placeholder-results {
            text-align: center;
            padding: 50px 20px;
            color: #aaa;
            font-size: 1rem;
        }

        .placeholder-results .big-icon { font-size: 3rem; margin-bottom: 12px; }

        /* JSZip loading indicator */
        .zip-loading {
            display: none;
            text-align: center;
            color: #1a237e;
            font-weight: 600;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .zip-loading.show { display: block; }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
            .settings-grid { grid-template-columns: 1fr; }
            .images-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .upload-section, .results-section, .settings-panel { padding: 20px; }
            .position-grid { max-width: 180px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>سالفورد للأثاث والمفروشات</h1>
        <p>أداة حماية حقوق صور المنتجات - 55943343</p>
    </div>

    <!-- لوحة الإعدادات -->
    <div class="settings-panel">
        <h2>⚙️ إعدادات الشعار</h2>
        <div class="settings-grid">

            <!-- الشفافية -->
            <div class="setting-group">
                <label>🔆 شفافية الشعار</label>
                <div class="opacity-wrap">
                    <input type="range" id="opacitySlider" min="5" max="100" value="60">
                    <span class="opacity-val" id="opacityVal">60%</span>
                </div>
            </div>

            <!-- حجم الشعار -->
            <div class="setting-group">
                <label>📐 حجم الشعار (% من عرض الصورة)</label>
                <div class="size-wrap">
                    <input type="range" id="sizeSlider" min="5" max="50" value="22">
                    <span class="opacity-val" id="sizeVal">22%</span>
                </div>
            </div>

            <!-- موضع الشعار -->
            <div class="setting-group">
                <label>📍 موضع الشعار في الصورة</label>
                <div class="position-grid" id="positionGrid">
                    <button class="pos-btn" data-pos="top-right" title="أعلى يمين">↖️</button>
                    <button class="pos-btn" data-pos="top-center" title="أعلى وسط">⬆️</button>
                    <button class="pos-btn" data-pos="top-left" title="أعلى يسار">↗️</button>
                    <button class="pos-btn" data-pos="middle-right" title="وسط يمين">⬅️</button>
                    <button class="pos-btn" data-pos="center" title="المنتصف">🎯</button>
                    <button class="pos-btn" data-pos="middle-left" title="وسط يسار">➡️</button>
                    <button class="pos-btn active" data-pos="bottom-right" title="أسفل يمين">↙️</button>
                    <button class="pos-btn" data-pos="bottom-center" title="أسفل وسط">⬇️</button>
                    <button class="pos-btn" data-pos="bottom-left" title="أسفل يسار">↘️</button>
                </div>
            </div>

            <!-- الهامش -->
            <div class="setting-group">
                <label>↔️ هامش الحافة (بالبكسل)</label>
                <div class="size-wrap">
                    <input type="range" id="marginSlider" min="0" max="100" value="25">
                    <span class="opacity-val" id="marginVal">25px</span>
                </div>
            </div>

        </div>
    </div>

    <!-- قسم الرفع -->
    <div class="upload-section">
        <h2>📸 رفع الصور</h2>
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">🖼️</div>
            <div class="upload-text">اختر صورة أو أكثر (حتى 50 صورة)</div>
            <div class="upload-subtext">أو اسحب الصور هنا — يدعم JPG, PNG, WEBP</div>
        </div>
        <input type="file" id="imageInput" accept="image/*" multiple>

        <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">جاري معالجة الصور...</div>
        </div>
    </div>

    <!-- قسم النتائج -->
    <div class="results-section">
        <div class="results-header">
            <h2>✅ الصور المعالجة</h2>
            <span class="results-count" id="resultsCount">0 صورة</span>
        </div>

        <div id="imagesGrid" class="images-grid">
            <div class="placeholder-results" id="placeholder" style="grid-column: 1/-1;">
                <div class="big-icon">🖼️</div>
                <div>ستظهر الصور المعالجة هنا</div>
            </div>
        </div>

        <div class="main-controls" id="mainControls" style="display:none;">
            <button class="btn-custom btn-download-all" id="downloadAllBtn">📦 تحميل الكل (ZIP)</button>
            <button class="btn-custom btn-reset" onclick="resetAll()">🔄 بدء من جديد</button>
        </div>
        <div class="zip-loading" id="zipLoading">⏳ جاري تجميع الملفات في ZIP...</div>
    </div>
</div>

<!-- JSZip للتحميل الجماعي -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
    // ===== متغيرات الإعدادات =====
    let logoOpacity = 0.6;
    let logoSizePercent = 22;
    let logoPosition = 'bottom-right';
    let logoMargin = 25;
    let processedCanvases = [];

    // تحميل الشعار
    const logo = new Image();
    logo.crossOrigin = "anonymous";
    logo.src = 'https://d2xsxph8kpxj0f.cloudfront.net/310519663547767452/TDpTsNpa4U4cknDzey95ka/salford_logo_clear-6Pb9FWkJ6SBu3XSDh6utEo.webp';

    // ===== ربط الإعدادات =====
    const opacitySlider = document.getElementById('opacitySlider');
    const sizeSlider = document.getElementById('sizeSlider');
    const marginSlider = document.getElementById('marginSlider');

    opacitySlider.addEventListener('input', () => {
        logoOpacity = opacitySlider.value / 100;
        document.getElementById('opacityVal').textContent = opacitySlider.value + '%';
    });

    sizeSlider.addEventListener('input', () => {
        logoSizePercent = parseInt(sizeSlider.value);
        document.getElementById('sizeVal').textContent = sizeSlider.value + '%';
    });

    marginSlider.addEventListener('input', () => {
        logoMargin = parseInt(marginSlider.value);
        document.getElementById('marginVal').textContent = marginSlider.value + 'px';
    });

    // أزرار المواضع
    document.getElementById('positionGrid').addEventListener('click', (e) => {
        const btn = e.target.closest('.pos-btn');
        if (!btn) return;
        document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        logoPosition = btn.dataset.pos;
    });

    // ===== منطقة الرفع =====
    const uploadArea = document.getElementById('uploadArea');
    const imageInput = document.getElementById('imageInput');

    uploadArea.addEventListener('click', () => imageInput.click());

    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));

    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
            processFiles(e.dataTransfer.files);
        }
    });

    imageInput.addEventListener('change', () => {
        if (imageInput.files.length > 0) processFiles(imageInput.files);
    });

    // ===== معالجة الصور =====
    function calcLogoPosition(canvasW, canvasH, logoW, logoH, margin, pos) {
        let x = 0, y = 0;
        switch (pos) {
            case 'top-right':    x = margin;              y = margin; break;
            case 'top-center':   x = (canvasW - logoW)/2; y = margin; break;
            case 'top-left':     x = canvasW - logoW - margin; y = margin; break;
            case 'middle-right': x = margin;              y = (canvasH - logoH)/2; break;
            case 'center':       x = (canvasW - logoW)/2; y = (canvasH - logoH)/2; break;
            case 'middle-left':  x = canvasW - logoW - margin; y = (canvasH - logoH)/2; break;
            case 'bottom-right': x = margin;              y = canvasH - logoH - margin; break;
            case 'bottom-center':x = (canvasW - logoW)/2; y = canvasH - logoH - margin; break;
            case 'bottom-left':  x = canvasW - logoW - margin; y = canvasH - logoH - margin; break;
        }
        return { x, y };
    }

    function processOneImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const cvs = document.createElement('canvas');
                    cvs.width = img.width;
                    cvs.height = img.height;
                    const ctx = cvs.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    const logoW = cvs.width * (logoSizePercent / 100);
                    const logoH = (logo.height / logo.width) * logoW;
                    const { x, y } = calcLogoPosition(cvs.width, cvs.height, logoW, logoH, logoMargin, logoPosition);

                    ctx.globalAlpha = logoOpacity;
                    ctx.drawImage(logo, x, y, logoW, logoH);
                    ctx.globalAlpha = 1.0;

                    resolve({ canvas: cvs, name: file.name });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    async function processFiles(files) {
        const fileArr = Array.from(files).slice(0, 50);
        processedCanvases = [];

        // إعادة تعيين الشبكة
        const grid = document.getElementById('imagesGrid');
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('mainControls').style.display = 'none';

        // شريط التقدم
        const progressWrap = document.getElementById('progressWrap');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        progressWrap.classList.add('show');

        // إزالة البطاقات القديمة
        grid.querySelectorAll('.image-card').forEach(c => c.remove());

        for (let i = 0; i < fileArr.length; i++) {
            const result = await processOneImage(fileArr[i]);
            processedCanvases.push(result);

            // إضافة البطاقة
            const card = document.createElement('div');
            card.className = 'image-card';

            const miniCanvas = document.createElement('canvas');
            // اجعل المعاينة بحجم 300px عرضاً كحد أقصى
            const maxW = 300;
            const scale = Math.min(1, maxW / result.canvas.width);
            miniCanvas.width = result.canvas.width * scale;
            miniCanvas.height = result.canvas.height * scale;
            const mCtx = miniCanvas.getContext('2d');
            mCtx.drawImage(result.canvas, 0, 0, miniCanvas.width, miniCanvas.height);

            const footer = document.createElement('div');
            footer.className = 'card-footer';

            const nameEl = document.createElement('span');
            nameEl.className = 'card-name';
            nameEl.textContent = result.name;

            const dlBtn = document.createElement('button');
            dlBtn.className = 'btn-dl-single';
            dlBtn.textContent = '💾';
            dlBtn.title = 'تحميل';
            dlBtn.addEventListener('click', () => downloadSingle(result));

            footer.appendChild(nameEl);
            footer.appendChild(dlBtn);
            card.appendChild(miniCanvas);
            card.appendChild(footer);
            grid.appendChild(card);

            // تحديث التقدم
            const pct = Math.round(((i + 1) / fileArr.length) * 100);
            progressFill.style.width = pct + '%';
            progressText.textContent = `تمت معالجة ${i + 1} من ${fileArr.length} صورة (${pct}%)`;
        }

        progressWrap.classList.remove('show');
        document.getElementById('resultsCount').textContent = processedCanvases.length + ' صورة';
        document.getElementById('mainControls').style.display = 'flex';
    }

    // تحميل صورة واحدة
    function downloadSingle(result) {
        const link = document.createElement('a');
        const baseName = result.name.replace(/\.[^/.]+$/, '');
        link.download = 'salford_' + baseName + '.png';
        link.href = result.canvas.toDataURL('image/png');
        link.click();
    }

    // تحميل الكل ZIP
    document.getElementById('downloadAllBtn').addEventListener('click', async () => {
        if (processedCanvases.length === 0) return;
        const zipLoading = document.getElementById('zipLoading');
        zipLoading.classList.add('show');

        const zip = new JSZip();
        const folder = zip.folder('salford_watermarked');

        for (const result of processedCanvases) {
            const base64 = result.canvas.toDataURL('image/png').split(',')[1];
            const baseName = result.name.replace(/\.[^/.]+$/, '');
            folder.file('salford_' + baseName + '.png', base64, { base64: true });
        }

        const blob = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'salford_watermarked_' + Date.now() + '.zip';
        link.click();

        zipLoading.classList.remove('show');
    });

    // إعادة التعيين
    function resetAll() {
        processedCanvases = [];
        const grid = document.getElementById('imagesGrid');
        grid.querySelectorAll('.image-card').forEach(c => c.remove());
        document.getElementById('placeholder').style.display = '';
        document.getElementById('mainControls').style.display = 'none';
        document.getElementById('resultsCount').textContent = '0 صورة';
        imageInput.value = '';
    }
</script>
</body>
</html>
