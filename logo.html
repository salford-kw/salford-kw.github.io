<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سالفورد للأثاث - إضافة العلامة المائية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            font-family: 'Lora', serif;
            color: #333;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            color: #1a237e;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .header p {
            color: #666;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        .upload-section {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            animation: fadeInLeft 0.8s ease-out;
        }

        .upload-section h2 {
            font-family: 'Playfair Display', serif;
            color: #1a237e;
            font-size: 1.8rem;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .upload-area {
            border: 3px dashed #c5a059;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .upload-area:hover {
            background: #f0f0f0;
            border-color: #a68546;
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            background: #f0f0f0;
            border-color: #1a237e;
            box-shadow: 0 5px 20px rgba(26, 35, 126, 0.2);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #c5a059;
        }

        .upload-text {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .upload-subtext {
            color: #999;
            font-size: 0.95rem;
        }

        #imageInput {
            display: none;
        }

        .preview-section {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            animation: fadeInRight 0.8s ease-out;
        }

        .preview-section h2 {
            font-family: 'Playfair Display', serif;
            color: #1a237e;
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        #canvas {
            width: 100%;
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
            display: none;
        }

        #canvas.show {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        .preview-placeholder {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            border-radius: 10px;
            padding: 60px 20px;
            text-align: center;
            color: #999;
            font-size: 1.1rem;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-custom {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Lora', serif;
            letter-spacing: 0.5px;
        }

        .btn-download {
            background-color: #c5a059;
            color: white;
        }

        .btn-download:hover {
            background-color: #a68546;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(197, 160, 89, 0.3);
        }

        .btn-reset {
            background-color: #1a237e;
            color: white;
        }

        .btn-reset:hover {
            background-color: #0d1b5e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26, 35, 126, 0.3);
        }

        .info-box {
            background: #f0f7ff;
            border-right: 4px solid #c5a059;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
            font-size: 0.95rem;
            color: #333;
        }

        .info-box strong {
            color: #1a237e;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .upload-section,
            .preview-section {
                padding: 25px;
            }

            .controls {
                flex-direction: column;
            }

            .btn-custom {
                width: 100%;
            }
        }

        .loading {
            display: none;
            text-align: center;
            color: #c5a059;
            font-weight: 600;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #c5a059;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>سالفورد للأثاث والمفروشات</h1>
        <p>أداة حماية حقوق صور المنتجات - 55943343</p>
    </div>

    <div class="main-content">
        <!-- قسم الرفع -->
        <div class="upload-section">
            <h2>رفع الصورة</h2>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📸</div>
                <div class="upload-text">اختر صورة المنتج</div>
                <div class="upload-subtext">أو اسحب الصورة هنا</div>
            </div>
            <input type="file" id="imageInput" accept="image/*">
            
            <div class="info-box">
                <strong>ملاحظة مهمة:</strong> سيتم إضافة شعار سالفورد الاحترافي كعلامة مائية شفافة على صورتك لحفظ حقوق ملكيتك الفكرية.
            </div>
        </div>

        <!-- قسم المعاينة -->
        <div class="preview-section">
            <h2>معاينة الصورة</h2>
            <div class="preview-placeholder" id="previewPlaceholder">
                سيتم عرض الصورة المحمية هنا
            </div>
            <canvas id="canvas"></canvas>
            
            <div class="controls" id="controls" style="display: none;">
                <button class="btn-custom btn-download" id="downloadBtn">📥 تحميل الصورة المحمية</button>
                <button class="btn-custom btn-reset" onclick="location.reload()">🔄 صورة جديدة</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>جاري معالجة الصورة...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const uploadArea = document.getElementById('uploadArea');
    const imageInput = document.getElementById('imageInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const downloadBtn = document.getElementById('downloadBtn');
    const controls = document.getElementById('controls');
    const previewPlaceholder = document.getElementById('previewPlaceholder');
    const loading = document.getElementById('loading');

    // تحميل الشعار الاحترافي من الرابط
    const logo = new Image();
    logo.crossOrigin = "anonymous";
    logo.src = 'https://d2xsxph8kpxj0f.cloudfront.net/310519663547767452/TDpTsNpa4U4cknDzey95ka/salford_logo_preview-WQ4x253NS989y4WBUQ9NCe.webp';

    // معالجة الرفع بالنقر
    uploadArea.addEventListener('click', () => {
        imageInput.click();
    });

    // معالجة السحب والإفلات
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            imageInput.files = files;
            processImage();
        }
    });

    // معالجة اختيار الملف
    imageInput.addEventListener('change', processImage);

    function processImage() {
        const file = imageInput.files[0];
        if (!file) return;

        loading.classList.add('show');
        controls.style.display = 'none';

        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                // إعداد أبعاد الكانفاس
                canvas.width = img.width;
                canvas.height = img.height;

                // رسم الصورة الأصلية
                ctx.drawImage(img, 0, 0);

                // حساب أبعاد الشعار
                const logoWidth = canvas.width * 0.22;
                const logoHeight = (logo.height / logo.width) * logoWidth;

                // رسم الشعار مع شفافية احترافية
                ctx.globalAlpha = 0.6;
                const x = canvas.width - logoWidth - 25;
                const y = canvas.height - logoHeight - 25;
                ctx.drawImage(logo, x, y, logoWidth, logoHeight);
                ctx.globalAlpha = 1.0;

                // إظهار النتائج
                canvas.classList.add('show');
                previewPlaceholder.style.display = 'none';
                controls.style.display = 'flex';
                loading.classList.remove('show');
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    // تحميل الصورة
    downloadBtn.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'salford_product_protected_' + new Date().getTime() + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
</script>

</body>
</html>
